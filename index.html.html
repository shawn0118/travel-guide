                                <RestaurantList restaurants={event.restaurants} />

                                {event.note && !event.restaurants && !event.supplies && (
                                    <div className="flex items-start gap-3 text-[#8E8377] text-xs md:text-sm bg-[#F5F2ED] p-4 md:p-5 rounded-xl italic font-medium border border-[#D4C7B8]/30">
                                        <i data-lucide="info" className="w-4 h-4 mt-0.5 opacity-50 shrink-0" aria-hidden="true"></i>
                                        {event.note}
                                    </div>
                                )}

                                {event.dur && (
                                    <div className="flex items-center gap-2 text-[9px] md:text-[10px] font-black text-[#8E8377] uppercase tracking-widest pl-2">
                                        <i data-lucide="clock" className="w-3 h-3" aria-hidden="true"></i> 建議停留: {event.dur}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /**
         * 3. 主程式層 (App)
         */
        const App = () => {
            const [activeDay, setActiveDay] = useState(0);
            
            const [completed, setCompleted] = useState(() => {
                const saved = localStorage.getItem('nagoya-completed');
                return saved ? JSON.parse(saved) : {};
            });
            const [checkedItems, setCheckedItems] = useState(() => {
                const saved = localStorage.getItem('nagoya-checked');
                return saved ? JSON.parse(saved) : {};
            });
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [swError, setSwError] = useState(null);

            // 監聽網路狀態與 SW 註冊事件
            useEffect(() => {
                const handleOnline = () => setIsOffline(false);
                const handleOffline = () => setIsOffline(true);
                const handleSwStatus = (e) => {
                    if (e.detail.status === 'error') {
                        setSwError(e.detail.message);
                    }
                };

                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                window.addEventListener('sw-status', handleSwStatus);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                    window.removeEventListener('sw-status', handleSwStatus);
                };
            }, []);

            useEffect(() => {
                localStorage.setItem('nagoya-completed', JSON.stringify(completed));
            }, [completed]);

            useEffect(() => {
                localStorage.setItem('nagoya-checked', JSON.stringify(checkedItems));
            }, [checkedItems]);

            useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
            }, [activeDay, isOffline, completed, checkedItems, swError]);

            const current = ITINERARY_DATA[activeDay];

            const toggleComplete = (dIndex, eIndex) => {
                setCompleted(prev => ({ ...prev, [`${dIndex}-${eIndex}`]: !prev[`${dIndex}-${eIndex}`] }));
            };

            const toggleChecklistItem = (listIndex, itemIndex) => {
                setCheckedItems(prev => ({ ...prev, [`${listIndex}-${itemIndex}`]: !prev[`${listIndex}-${itemIndex}`] }));
            };

            const retrySwRegistration = () => {
                setSwError(null);
                window.location.reload(); // 單檔架構下最直接的重試方式
            };

            // 計算動態打卡進度 (排除行前準備與成就頁面本身)
            const totalEvents = ITINERARY_DATA.reduce((acc, day) => day.events ? acc + day.events.length : acc, 0);
            const completedEventsCount = Object.values(completed).filter(Boolean).length;
            const progressPercentage = totalEvents === 0 ? 0 : Math.round((completedEventsCount / totalEvents) * 100);

            return (
                <div className="pb-20 md:pb-24">
                    <header className="bg-white/70 backdrop-blur-lg sticky top-0 z-50 border-b border-[#D4C7B8] px-4 md:px-6 py-4 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-3">
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <div className="bg-slate-800 p-2 rounded-xl text-white shadow-lg shrink-0">
                                    <i data-lucide="navigation" className="w-5 h-5" aria-hidden="true"></i>
                                </div>
                                <h1 className="text-base md:text-lg font-black text-slate-800 tracking-tight flex items-center gap-2">
                                    超絕那古野行
                                    {isOffline && (
                                        <span className="bg-amber-100 text-amber-700 text-[10px] px-1.5 py-0.5 rounded-md flex items-center gap-1 border border-amber-200 shadow-sm shrink-0">
                                            <i data-lucide="wifi-off" className="w-3 h-3" aria-hidden="true"></i> 離線中
                                        </span>
                                    )}
                                </h1>
                            </div>
                            {/* 加上 aria-label 與 aria-current 提示 */}
                            <nav className="flex bg-[#DCD4C9] p-1 rounded-xl no-scrollbar overflow-x-auto w-full md:w-auto" aria-label="行程天數導航">
                                {ITINERARY_DATA.map((day, i) => (
                                    <button key={i} onClick={() => setActiveDay(i)}
                                        aria-current={activeDay === i ? 'page' : undefined}
                                        className={`px-3 md:px-4 py-2 rounded-lg text-[10px] md:text-xs font-bold transition-all whitespace-nowrap focus-visible:ring-2 focus-visible:ring-indigo-500 ${activeDay === i ? 'nav-active' : 'text-slate-600 hover:text-slate-900'}`}>
                                        {day.tabLabel}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    {/* SW 錯誤提示 Toast */}
                    {swError && (
                        <div className="bg-red-50 border-l-4 border-red-500 p-4 mx-4 md:mx-auto mt-6 max-w-7xl rounded shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4" role="alert">
                            <div className="flex items-center gap-3">
                                <i data-lucide="alert-circle" className="text-red-500 w-5 h-5 shrink-0" aria-hidden="true"></i>
                                <p className="text-sm text-red-700 font-medium">{swError}</p>
                            </div>
                            <div className="flex gap-3 w-full md:w-auto pl-8 md:pl-0">
                                <button onClick={retrySwRegistration} className="text-xs bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded font-bold transition-colors focus-visible:ring-2 focus-visible:ring-red-500">重新嘗試</button>
                                <button onClick={() => setSwError(null)} aria-label="關閉提示" className="text-red-400 hover:text-red-700 p-1.5 rounded focus-visible:ring-2 focus-visible:ring-red-500">
                                    <i data-lucide="x" className="w-4 h-4" aria-hidden="true"></i>
                                </button>
                            </div>
                        </div>
                    )}

                    <main key={activeDay} className="max-w-7xl mx-auto px-4 md:px-6 py-10 md:py-16">
                        <div className="mb-10 md:mb-20 text-center lg:text-left">
                            <p className="text-indigo-700 text-[10px] md:text-xs font-black tracking-[0.2em] uppercase mb-2">Self-Drive Journey</p>
                            <h2 className="text-2xl md:text-4xl font-black text-slate-900 tracking-tight leading-tight">
                                {current.date} <span className="text-[#B0A496] mx-1">/</span> <br className="md:hidden" />
                                <span className="text-indigo-800">{current.theme}</span>
                            </h2>
                        </div>

                        {current.isPrep ? (
                            /* 行前準備專屬版面 */
                            <div className="space-y-12">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-8">
                                    {current.memos.map((m, i) => (
                                        <FeatureCard key={i} icon={m.icon} title={m.title} text={m.text} colorClass="text-indigo-700" />
                                    ))}
                                </div>
                                {/* 更新 grid-cols，加入 lg:grid-cols-3 讓三個清單並排 */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 mt-10">
                                    {current.checklists.map((list, i) => (
                                        <div key={i} className="bg-white p-6 md:p-8 rounded-[2rem] border border-[#D4C7B8]/40 shadow-sm">
                                            <h4 className="font-black text-lg text-slate-800 mb-6 flex items-center gap-3">
                                                <i data-lucide="check-square" className="text-emerald-600" aria-hidden="true"></i> {list.title}
                                            </h4>
                                            <ul className="space-y-4">
                                                {list.items.map((item, j) => {
                                                    const isChecked = checkedItems[`${i}-${j}`];
                                                    return (
                                                        <li key={j} className="flex">
                                                            {/* 重構成標準具備鍵盤與無障礙支援的按鈕 */}
                                                            <button 
                                                                type="button"
                                                                role="checkbox"
                                                                aria-checked={isChecked}
                                                                aria-label={`標記 ${item} ${isChecked ? '為未完成' : '為已完成'}`}
                                                                onClick={() => toggleChecklistItem(i, j)}
                                                                className="flex items-start gap-3 text-sm md:text-base text-slate-700 font-medium cursor-pointer select-none group w-full text-left focus-visible:ring-2 focus-visible:ring-emerald-500 rounded py-1">
                                                                
                                                                <div className={`w-5 h-5 shrink-0 mt-0.5 rounded border flex items-center justify-center transition-all ${isChecked ? 'bg-emerald-500 border-emerald-500' : 'border-slate-300 group-hover:border-emerald-400'}`}>
                                                                    <svg className={`w-3.5 h-3.5 text-white transition-opacity ${isChecked ? 'opacity-100' : 'opacity-0'}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3} aria-hidden="true">
                                                                        <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                                                                    </svg>
                                                                </div>
                                                                <span className={`transition-all ${isChecked ? 'text-slate-400 line-through' : ''}`}>
                                                                    {item}
                                                                </span>
                                                            </button>
                                                        </li>
                                                    );
                                                })}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : current.isAchievement ? (
                            /* 旅途成就專屬版面 */
                            <div className="space-y-12">
                                {/* 動態打卡進度條 */}
                                <div className="bg-white p-6 md:p-8 rounded-[2rem] border border-[#D4C7B8]/40 shadow-sm text-center relative overflow-hidden">
                                    <h3 className="text-xl md:text-2xl font-black text-slate-800 mb-2 flex justify-center items-center gap-2 relative z-10">
                                        <i data-lucide="medal" className="text-yellow-500" aria-hidden="true"></i> 旅途達成率
                                    </h3>
                                    <p className="text-sm text-slate-500 font-medium mb-6 relative z-10">點擊行程列表左側的空心圓圈，紀錄您的專屬打卡足跡</p>
                                    
                                    <div className="w-full bg-slate-100 rounded-full h-6 md:h-8 mb-4 overflow-hidden border border-slate-200 relative z-10">
                                        <div className="bg-gradient-to-r from-blue-500 to-indigo-500 h-full rounded-full transition-all duration-1000 ease-out flex items-center justify-end px-3 min-w-[2rem]" style={{ width: `${progressPercentage}%` }}>
                                            <span className="text-white text-xs font-bold drop-shadow-md">{progressPercentage}%</span>
                                        </div>
                                    </div>
                                    <p className="text-slate-700 font-bold relative z-10">已完成 {completedEventsCount} / {totalEvents} 個行程節點</p>
                                    
                                    {/* 背景裝飾 */}
                                    <i data-lucide="flag" className="absolute -bottom-6 -left-4 w-32 h-32 opacity-5 text-indigo-500 transform -rotate-12 z-0" aria-hidden="true"></i>
                                </div>

                                {/* 數據統計儀表板 */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                                    {current.stats.map((s, i) => (
                                        <div key={i} className="bg-gradient-to-br from-white to-slate-50 p-5 rounded-2xl border border-[#D4C7B8]/40 shadow-sm flex flex-col items-center justify-center text-center hover:-translate-y-1 transition-transform">
                                            <div className="bg-indigo-100 text-indigo-600 p-3 rounded-full mb-3 shadow-sm">
                                                <i data-lucide={s.icon} className="w-6 h-6" aria-hidden="true"></i>
                                            </div>
                                            <p className="text-xs text-slate-500 font-bold mb-1 tracking-widest uppercase">{s.label}</p>
                                            <p className="text-2xl md:text-3xl font-black text-slate-800 tracking-tighter">{s.value}<span className="text-sm font-bold text-slate-500 ml-1">{s.unit}</span></p>
                                        </div>
                                    ))}
                                </div>

                                {/* 成就徽章牆 */}
                                <div className="mt-10">
                                    <h4 className="text-slate-800 font-black text-lg md:text-xl mb-6 md:mb-8 flex items-center gap-3">
                                        <i data-lucide="award" className="text-yellow-500" aria-hidden="true"></i> 解鎖成就徽章
                                    </h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                                        {current.badges.map((badge, i) => {
                                            // 隨著打卡進度 (15%, 30%, 45%...) 逐步解鎖徽章
                                            const isUnlocked = progressPercentage >= ((i + 1) * 15);
                                            return (
                                                <div key={i} className={`p-5 rounded-[1.5rem] border ${isUnlocked ? badge.border : 'border-slate-200'} ${isUnlocked ? badge.bg : 'bg-slate-50'} relative overflow-hidden transition-all duration-500`}>
                                                    <div className="flex items-start gap-4 relative z-10">
                                                        <div className={`p-3 rounded-xl shrink-0 transition-colors duration-500 ${isUnlocked ? 'bg-white shadow-sm' : 'bg-slate-200'} ${isUnlocked ? badge.color : 'text-slate-400'}`}>
                                                            <i data-lucide={isUnlocked ? badge.icon : 'lock'} className="w-6 h-6" aria-hidden="true"></i>
                                                        </div>
                                                        <div>
                                                            <h5 className={`font-black text-base md:text-lg mb-1.5 transition-colors duration-500 ${isUnlocked ? 'text-slate-800' : 'text-slate-400'}`}>{badge.name}</h5>
                                                            <p className={`text-xs leading-relaxed font-medium transition-colors duration-500 ${isUnlocked ? 'text-slate-700/90' : 'text-slate-400'}`}>{isUnlocked ? badge.desc : `行程達成率達 ${(i + 1) * 15}% 即可解鎖！`}</p>
                                                        </div>
                                                    </div>
                                                    {/* 徽章背景浮水印 */}
                                                    {isUnlocked && (
                                                        <i data-lucide="check-circle" className={`absolute -bottom-4 -right-4 w-24 h-24 opacity-10 ${badge.color} transform -rotate-12 z-0`} aria-hidden="true"></i>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            /* 每日行程常規版面 */
                            <div className="relative">
                                {/* 新增：歷史氣候與穿衣建議區塊 */}
                                {current.weatherAdvice && (
                                    <div className="bg-gradient-to-r from-blue-50 to-sky-50/50 border border-blue-200/60 rounded-2xl md:rounded-[2rem] p-5 md:p-6 mb-10 md:mb-16 shadow-[inset_0_0_20px_rgba(255,255,255,0.8)] flex flex-col md:flex-row items-start gap-4">
                                        <div className="bg-blue-600 text-white p-2.5 rounded-xl md:rounded-2xl shrink-0 shadow-sm md:mt-1">
                                            <i data-lucide="cloud-sun" className="w-5 h-5 md:w-6 md:h-6" aria-hidden="true"></i>
                                        </div>
                                        <div className="w-full">
                                            <div className="flex flex-wrap items-center gap-2 mb-2 md:mb-3">
                                                <h3 className="font-black text-blue-900 text-sm md:text-base tracking-wide">歷史氣象與穿衣指南</h3>
                                                <span className="text-[10px] md:text-xs font-bold text-blue-700 bg-white px-2 py-1 rounded-lg border border-blue-200 shadow-sm flex items-center gap-1.5 whitespace-nowrap">
                                                    <i data-lucide="thermometer" className="w-3 h-3" aria-hidden="true"></i> {current.weatherAdvice.temp}
                                                </span>
                                            </div>
                                            <p className="text-[13px] md:text-[15px] text-blue-900/80 leading-relaxed font-medium">
                                                {current.weatherAdvice.dress}
                                            </p>
                                        </div>
                                    </div>
                                )}

                                <div className="timeline-line-center hidden lg:block"></div>
                                <div className="space-y-12 md:space-y-24">
                                    {current.events.map((ev, i) => (
                                        <EventCard 
                                            key={i} 
                                            event={{ ...ev, isLast: i === current.events.length - 1 }} 
                                            dayIndex={activeDay} 
                                            eventIndex={i}
                                            completed={completed}
                                            onToggle={() => toggleComplete(activeDay, i)}
                                        />
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 特產與紀念品 (非行前準備頁面才顯示) */}
                        {!current.isPrep && current.souvenirs && current.souvenirs.length > 0 && (
                            <div className="mt-20 md:mt-32 border-t border-[#D4C7B8] pt-10 md:pt-16">
                                <h4 className="text-slate-800 font-black text-lg md:text-xl mb-6 md:mb-8 flex items-center gap-3">
                                    <i data-lucide="gift" className="text-pink-600" aria-hidden="true"></i> 地區特產與紀念品推薦
                                </h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8">
                                    {current.souvenirs.map((s, idx) => (
                                        <FeatureCard key={idx} icon={s.icon} title={s.title} text={s.text} colorClass="text-pink-600" />
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
